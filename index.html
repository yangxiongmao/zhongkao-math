<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>北大熊猫老师中考数学押题 · 每日打卡</title>
  <!-- Open Graph / 微信分享预览 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="北大熊猫老师中考数学押题 · 精准押题 每日打卡">
  <meta property="og:description" content="覆盖北京16区，一模/二模/真题/汇编全题型。50万+学生在用，95%押题命中率，助力2026中考冲刺满分！">
  <meta property="og:image" content="https://img.icons8.com/3d-fluency/512/math.png">
  <meta name="description" content="北大熊猫老师2026北京中考数学押题平台，覆盖16区一模、二模、真题、汇编，每日打卡助力冲刺满分">
  <meta name="keywords" content="中考数学,北京中考,押题,一模,二模,真题,数学试卷,打卡">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
            accent: { 50:'#fdf4ff',100:'#fae8ff',200:'#f5d0fe',300:'#f0abfc',400:'#e879f9',500:'#d946ef',600:'#c026d3',700:'#a21caf' },
            gold: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706' },
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; padding-bottom: env(safe-area-inset-bottom, 0); }
    /* 微信浏览器兼容 */
    input, button, textarea { -webkit-appearance: none; border-radius: 0; }
    button { -webkit-tap-highlight-color: transparent; }
    img { -webkit-touch-callout: none; }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15); }
    .gradient-text { background: linear-gradient(135deg, #2563eb, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-bg { background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 50%, #fdf4ff 100%); }
    .badge-hot { animation: pulse-hot 2s infinite; }
    @keyframes pulse-hot { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .tab-active { position: relative; }
    .tab-active::after { content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); width: 60%; height: 3px; background: linear-gradient(90deg, #2563eb, #7c3aed); border-radius: 2px; }
    .checkin-ring { background: conic-gradient(#3b82f6 var(--progress), #e5e7eb var(--progress)); }
    .confetti { position: fixed; pointer-events: none; z-index: 100; }
    .confetti span { position: absolute; display: block; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 1.5s ease-out forwards; }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(400px) rotate(720deg) scale(0.3); }
    }
    .streak-fire { animation: fireGlow 1.5s ease-in-out infinite alternate; }
    @keyframes fireGlow { from { filter: drop-shadow(0 0 4px rgba(249,115,22,0.5)); } to { filter: drop-shadow(0 0 8px rgba(249,115,22,0.8)); } }
    .share-btn { position: relative; overflow: hidden; }
    .share-btn::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
      animation: shimmer 3s infinite; }
    @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app" x-cloak>

  <!-- 导航栏 -->
  <nav class="sticky top-0 z-50 glass border-b border-gray-200/60">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2 cursor-pointer" @click="goHome()">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-accent-600 flex items-center justify-center">
          <iconify-icon icon="lucide:square-radical" class="text-white text-base"></iconify-icon>
        </div>
        <span class="font-bold text-lg gradient-text">北大熊猫老师中考数学押题</span>
      </div>
      <div class="flex items-center gap-2">
        <button @click="page = 'checkin'" class="relative text-sm text-gray-600 hover:text-primary-600 transition flex items-center gap-1 px-2 py-1 rounded-lg hover:bg-primary-50"
          :class="page === 'checkin' && 'text-primary-600 bg-primary-50 font-medium'">
          <iconify-icon icon="lucide:calendar-check" class="text-base"></iconify-icon>
          <span class="hidden sm:inline">打卡</span>
          <template x-if="streak > 0">
            <span class="absolute -top-1 -right-1 w-4 h-4 bg-orange-500 text-white text-[9px] rounded-full flex items-center justify-center font-bold" x-text="streak"></span>
          </template>
        </button>
        <button @click="page = 'pricing'" class="text-sm text-gray-600 hover:text-primary-600 transition flex items-center gap-1 px-2 py-1 rounded-lg hover:bg-primary-50"
          :class="page === 'pricing' && 'text-primary-600 bg-primary-50 font-medium'">
          <iconify-icon icon="lucide:crown" class="text-gold-500"></iconify-icon>
          <span class="hidden sm:inline">会员</span>
        </button>
        <button @click="handleShare()" class="text-sm text-gray-600 hover:text-primary-600 transition flex items-center gap-1 px-2 py-1 rounded-lg hover:bg-primary-50">
          <iconify-icon icon="lucide:share-2" class="text-base"></iconify-icon>
          <span class="hidden sm:inline">分享</span>
        </button>
        <div class="w-8 h-8 rounded-full bg-primary-100 flex items-center justify-center text-primary-600 text-sm font-medium cursor-pointer"
          @click="showNicknameModal = !isGuest ? false : true"
          x-text="displayInitial"></div>
      </div>
    </div>
  </nav>

  <!-- ===== 首页 ===== -->
  <template x-if="page === 'home'">
    <div class="fade-in">
      <!-- Hero -->
      <section class="hero-bg py-10 px-4">
        <div class="max-w-6xl mx-auto text-center">
          <div class="inline-flex items-center gap-1.5 bg-white/80 border border-primary-200 rounded-full px-3 py-1 text-xs text-primary-700 mb-4">
            <iconify-icon icon="lucide:flame" class="text-orange-500 badge-hot"></iconify-icon>
            2026 北京中考冲刺专题
          </div>
          <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-3 leading-tight">
            精准押题 · 每日打卡
          </h1>
          <p class="text-gray-500 text-sm md:text-base max-w-xl mx-auto mb-6">
            覆盖北京 16 区 · 一模 / 二模 / 真题 / 汇编全题型<br>每天坚持打卡，中考数学稳拿高分
          </p>
          <!-- 打卡进度条 (首页摘要) -->
          <div class="max-w-md mx-auto bg-white/90 rounded-2xl p-4 border border-gray-100 shadow-sm mb-6">
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-2">
                <template x-if="streak > 0">
                  <iconify-icon icon="lucide:flame" class="text-orange-500 text-lg streak-fire"></iconify-icon>
                </template>
                <span class="text-sm font-bold text-gray-800">
                  已连续打卡 <span class="gradient-text" x-text="streak"></span> 天
                </span>
              </div>
              <button @click="page = 'checkin'" class="text-xs text-primary-500 hover:text-primary-700">查看详情 &rarr;</button>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-2 mb-2">
              <div class="h-2 rounded-full bg-gradient-to-r from-primary-500 to-accent-500 transition-all duration-500"
                :style="'width:' + Math.min(streak / 30 * 100, 100) + '%'"></div>
            </div>
            <div class="flex justify-between text-[10px] text-gray-400">
              <span>0天</span>
              <span>目标 30 天</span>
            </div>
          </div>
          <div class="flex justify-center gap-3">
            <button @click="page = 'checkin'" class="share-btn px-6 py-2.5 bg-gradient-to-r from-primary-600 to-primary-700 text-white rounded-xl text-sm font-medium shadow-lg shadow-primary-200 hover:shadow-xl transition">
              <iconify-icon icon="lucide:calendar-check" class="mr-1"></iconify-icon>
              今日打卡
            </button>
            <button @click="page = 'papers'" class="px-6 py-2.5 bg-white text-gray-700 rounded-xl text-sm font-medium border border-gray-200 hover:border-primary-300 hover:text-primary-600 transition">
              浏览试卷
            </button>
          </div>
        </div>
      </section>

      <!-- 数据统计 -->
      <section class="max-w-6xl mx-auto px-4 -mt-5">
        <div class="grid grid-cols-4 gap-3">
          <template x-for="s in stats" :key="s.label">
            <div class="bg-white rounded-xl p-3 md:p-4 text-center shadow-sm border border-gray-100">
              <div class="text-xl md:text-2xl font-bold gradient-text" x-text="s.value"></div>
              <div class="text-[10px] md:text-xs text-gray-400 mt-1" x-text="s.label"></div>
            </div>
          </template>
        </div>
      </section>

      <!-- 快捷入口 - 区域 -->
      <section class="max-w-6xl mx-auto px-4 mt-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-gray-800">热门区域</h2>
          <button @click="page = 'papers'" class="text-xs text-primary-500 hover:text-primary-700 flex items-center gap-0.5">
            查看全部 <iconify-icon icon="lucide:chevron-right"></iconify-icon>
          </button>
        </div>
        <div class="grid grid-cols-4 md:grid-cols-8 gap-2">
          <template x-for="d in hotDistricts" :key="d">
            <button @click="selectedDistrict = d; page = 'papers'"
              class="bg-white rounded-xl py-3 text-center text-sm text-gray-700 hover:bg-primary-50 hover:text-primary-600 border border-gray-100 hover:border-primary-200 transition card-hover">
              <span x-text="d"></span>
            </button>
          </template>
        </div>
      </section>

      <!-- 推荐试卷 -->
      <section class="max-w-6xl mx-auto px-4 mt-8 pb-24 sm:pb-12">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-gray-800">精选推荐</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <template x-for="p in featuredPapers" :key="p.id">
            <div @click="viewPaper(p)" class="bg-white rounded-xl p-4 border border-gray-100 cursor-pointer card-hover">
              <div class="flex items-start justify-between mb-3">
                <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                  :class="categoryColor(p.category)" x-text="p.category"></span>
                <span class="text-xs text-gray-400" x-text="p.year + '年'"></span>
              </div>
              <h3 class="font-semibold text-gray-800 text-sm mb-1" x-text="p.title"></h3>
              <p class="text-xs text-gray-400 mb-3" x-text="p.district + ' · ' + p.questionCount + '题 · ' + p.difficulty"></p>
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-1 text-xs text-gray-400">
                  <iconify-icon icon="lucide:download"></iconify-icon>
                  <span x-text="p.downloads + ' 人已下载'"></span>
                </div>
                <template x-if="p.free">
                  <span class="text-xs text-green-600 font-medium">免费</span>
                </template>
                <template x-if="!p.free">
                  <span class="text-xs text-gold-600 font-medium flex items-center gap-0.5">
                    <iconify-icon icon="lucide:crown" class="text-[10px]"></iconify-icon> 会员
                  </span>
                </template>
              </div>
            </div>
          </template>
        </div>
      </section>
    </div>
  </template>

  <!-- ===== 打卡页 ===== -->
  <template x-if="page === 'checkin'">
    <div class="fade-in max-w-2xl mx-auto px-4 py-6">
      <!-- 打卡头部 -->
      <div class="bg-gradient-to-br from-primary-600 via-primary-700 to-accent-700 rounded-2xl p-6 text-white mb-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -translate-y-1/2 translate-x-1/2"></div>
        <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/5 rounded-full translate-y-1/2 -translate-x-1/2"></div>
        <div class="relative z-10">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h2 class="text-xl font-bold mb-1">每日打卡</h2>
              <p class="text-primary-200 text-xs" x-text="todayStr"></p>
            </div>
            <div class="flex items-center gap-1.5">
              <iconify-icon icon="lucide:flame" class="text-orange-300 text-2xl streak-fire"></iconify-icon>
              <div class="text-right">
                <div class="text-2xl font-extrabold" x-text="streak"></div>
                <div class="text-[10px] text-primary-200">连续天数</div>
              </div>
            </div>
          </div>
          <!-- 本周打卡点 -->
          <div class="grid grid-cols-7 gap-2">
            <template x-for="d in weekDays" :key="d.label">
              <div class="text-center">
                <div class="text-[10px] text-primary-200 mb-1" x-text="d.label"></div>
                <div class="w-8 h-8 rounded-full flex items-center justify-center mx-auto text-xs font-medium"
                  :class="d.checked ? 'bg-white text-primary-700' : (d.isToday ? 'bg-white/20 text-white border-2 border-white/40' : 'bg-white/10 text-primary-300')">
                  <template x-if="d.checked">
                    <iconify-icon icon="lucide:check" class="text-sm"></iconify-icon>
                  </template>
                  <template x-if="!d.checked">
                    <span x-text="d.date"></span>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- 打卡按钮 -->
      <div class="bg-white rounded-2xl border border-gray-100 p-6 mb-6 text-center">
        <template x-if="!todayChecked">
          <div>
            <p class="text-sm text-gray-500 mb-4">今天还没有打卡哦，完成一套试卷即可打卡！</p>
            <button @click="doCheckin()"
              class="share-btn w-32 h-32 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 text-white mx-auto flex flex-col items-center justify-center shadow-xl shadow-primary-200 hover:shadow-2xl transition-all hover:scale-105 active:scale-95">
              <iconify-icon icon="lucide:calendar-check" class="text-3xl mb-1"></iconify-icon>
              <span class="text-sm font-bold">打卡</span>
            </button>
            <p class="text-xs text-gray-400 mt-3">点击打卡记录今日学习</p>
          </div>
        </template>
        <template x-if="todayChecked">
          <div>
            <div class="w-24 h-24 rounded-full bg-green-50 mx-auto flex items-center justify-center mb-3">
              <iconify-icon icon="lucide:check-circle" class="text-green-500 text-5xl"></iconify-icon>
            </div>
            <p class="text-lg font-bold text-gray-800 mb-1">今日已打卡!</p>
            <p class="text-sm text-gray-400 mb-4">坚持就是胜利，明天继续加油!</p>
            <button @click="page = 'papers'" class="px-6 py-2 bg-primary-50 text-primary-600 rounded-xl text-sm font-medium hover:bg-primary-100 transition">
              继续刷题 <iconify-icon icon="lucide:arrow-right" class="ml-1"></iconify-icon>
            </button>
          </div>
        </template>
      </div>

      <!-- 打卡统计 -->
      <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="bg-white rounded-xl p-4 text-center border border-gray-100">
          <div class="text-2xl font-bold text-primary-600" x-text="totalCheckins"></div>
          <div class="text-xs text-gray-400 mt-1">累计打卡</div>
        </div>
        <div class="bg-white rounded-xl p-4 text-center border border-gray-100">
          <div class="text-2xl font-bold text-orange-500" x-text="streak"></div>
          <div class="text-xs text-gray-400 mt-1">连续打卡</div>
        </div>
        <div class="bg-white rounded-xl p-4 text-center border border-gray-100">
          <div class="text-2xl font-bold text-accent-500" x-text="maxStreak"></div>
          <div class="text-xs text-gray-400 mt-1">最长连续</div>
        </div>
      </div>

      <!-- 打卡日历 -->
      <div class="bg-white rounded-2xl border border-gray-100 p-5 mb-6">
        <div class="flex items-center justify-between mb-4">
          <button @click="prevMonth()" class="p-1 hover:bg-gray-100 rounded-lg">
            <iconify-icon icon="lucide:chevron-left" class="text-gray-400"></iconify-icon>
          </button>
          <h3 class="text-sm font-bold text-gray-800" x-text="calendarTitle"></h3>
          <button @click="nextMonth()" class="p-1 hover:bg-gray-100 rounded-lg">
            <iconify-icon icon="lucide:chevron-right" class="text-gray-400"></iconify-icon>
          </button>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center text-xs mb-2">
          <template x-for="w in ['一','二','三','四','五','六','日']">
            <div class="text-gray-400 py-1" x-text="w"></div>
          </template>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center">
          <template x-for="d in calendarDays" :key="d.key">
            <div class="py-1.5">
              <template x-if="d.day">
                <div class="w-8 h-8 rounded-full flex items-center justify-center mx-auto text-xs"
                  :class="{
                    'bg-primary-500 text-white font-bold': d.checked && d.isToday,
                    'bg-primary-100 text-primary-700 font-medium': d.checked && !d.isToday,
                    'ring-2 ring-primary-300 text-gray-700': !d.checked && d.isToday,
                    'text-gray-400': !d.checked && !d.isToday && d.day
                  }" x-text="d.day"></div>
              </template>
            </div>
          </template>
        </div>
      </div>

      <!-- 打卡排行榜 -->
      <div class="bg-white rounded-2xl border border-gray-100 p-5">
        <h3 class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
          <iconify-icon icon="lucide:trophy" class="text-gold-500"></iconify-icon>
          打卡排行榜
        </h3>
        <div class="space-y-2">
          <template x-for="(r, i) in leaderboard" :key="r.name">
            <div class="flex items-center gap-3 p-2 rounded-lg" :class="i < 3 && 'bg-gold-50/50'">
              <div class="w-6 text-center flex-shrink-0">
                <template x-if="i === 0"><iconify-icon icon="lucide:medal" class="text-gold-500"></iconify-icon></template>
                <template x-if="i === 1"><iconify-icon icon="lucide:medal" class="text-gray-400"></iconify-icon></template>
                <template x-if="i === 2"><iconify-icon icon="lucide:medal" class="text-orange-400"></iconify-icon></template>
                <template x-if="i >= 3"><span class="text-xs text-gray-400" x-text="i + 1"></span></template>
              </div>
              <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-medium flex-shrink-0"
                :class="r.isMe ? 'bg-primary-100 text-primary-600' : 'bg-gray-100 text-gray-500'"
                x-text="r.name.charAt(0)"></div>
              <div class="flex-1 min-w-0">
                <span class="text-sm text-gray-800 font-medium truncate block" x-text="r.name"></span>
              </div>
              <div class="flex items-center gap-1 text-xs text-orange-500 font-medium flex-shrink-0">
                <iconify-icon icon="lucide:flame" class="text-sm"></iconify-icon>
                <span x-text="r.streak + '天'"></span>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== 试卷列表页 ===== -->
  <template x-if="page === 'papers'">
    <div class="fade-in max-w-6xl mx-auto px-4 py-6">
      <!-- 区域选择 -->
      <div class="mb-5">
        <h3 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">选择区域</h3>
        <div class="flex flex-wrap gap-2">
          <button @click="selectedDistrict = '全部'"
            class="px-3 py-1.5 rounded-lg text-xs font-medium border transition"
            :class="selectedDistrict === '全部' ? 'bg-primary-600 text-white border-primary-600' : 'bg-white text-gray-600 border-gray-200 hover:border-primary-300'">
            全部区域
          </button>
          <template x-for="d in allDistricts" :key="d">
            <button @click="selectedDistrict = d"
              class="px-3 py-1.5 rounded-lg text-xs font-medium border transition"

    const DB_PREFIX = 'zkmath_';
    const safeLS = {
      async getItem(key) {
        try { const api = window.moxt; if (api && api.localStorage) return await api.localStorage.getItem(key); } catch (e) { console.warn('[Storage] Moxt 读取失败，降级:', e.message); }
        try { return localStorage.getItem(DB_PREFIX + key); } catch { return null; }
      },
      async setItem(key, val) {
        try { const api = window.moxt; if (api && api.localStorage) await api.localStorage.setItem(key, val); } catch (e) { console.warn('[Storage] Moxt 写入失败，降级:', e.message); }
        try { localStorage.setItem(DB_PREFIX + key, val); } catch {}
      }
    };
    const safeCol = {
      wrap(col) {
        if (!col) return null;
        const safe = (method) => async (...args) => { try { return await col[method](...args); } catch(e) { console.warn(`[Col] ${method} 失败:`, e.message); return method === 'find' ? [] : null; } };
        return { find: safe('find'), findOne: safe('findOne'), insertOne: safe('insertOne'), updateOne: safe('updateOne'), replaceOne: safe('replaceOne') };
      }
    };

              isToday: this.dateKey(today) === dateStr,
              checked: this.checkinDates.includes(dateStr)

          const daysInMonth = new Date(this.calendarYear, this.calendarMonth + 1, 0).getDate();
          const today = new Date();
          const todayKey = this.dateKey(today);
          const cells = [];
          for (let i = 1; i < startDow; i++) {
            cells.push({ key: 'e' + i, day: null, checked: false, isToday: false });
          }
          for (let d = 1; d <= daysInMonth; d++) {
            const dt = new Date(this.calendarYear, this.calendarMonth, d);
            const dk = this.dateKey(dt);
            cells.push({
              key: dk,
              day: d,
              checked: this.checkinDates.includes(dk),
              isToday: dk === todayKey
            });
          }
          return cells;
        },

        get featuredPapers() {
          return [...this.papers].sort((a, b) => b.downloads - a.downloads).slice(0, 6);
        },

        get filteredPapers() {
          return this.papers.filter(p => {
            if (this.selectedDistrict !== '全部' && p.district !== this.selectedDistrict) return false;
            if (this.selectedCategory !== '全部' && p.category !== this.selectedCategory) return false;
            if (this.selectedYear !== '全部' && p.year !== parseInt(this.selectedYear)) return false;
            return true;
          }).sort((a, b) => b.downloads - a.downloads);
        },

        async init() {
          this.isWechat = /micromessenger/i.test(navigator.userAgent.toLowerCase());

          try {
            const api = window.moxt;
            const user = api && api.currentMember;
            if (user && user.email) {
              this.isGuest = false;
              this.userName = user.displayName || user.email.split('@')[0];
              this.displayName = this.userName;
            } else {
              this.isGuest = true; this.userName = '同学'; this.displayName = '同学';
            }
            this.collection = safeCol.wrap(api && api.collection('papers'));
            this.userCol = safeCol.wrap(api && api.collection('user_state'));
            this.checkinCol = safeCol.wrap(api && api.collection('checkins'));
            this.leaderCol = safeCol.wrap(api && api.collection('leaderboard'));
          } catch (e) {
            console.warn('[Init] Moxt API 不可用，使用离线模式:', e.message);
            this.isGuest = true; this.userName = '同学'; this.displayName = '同学';
            this.collection = null; this.userCol = null; this.checkinCol = null; this.leaderCol = null;
          }

          const savedName = await safeLS.getItem('guest_nickname');
          if (savedName) { this.displayName = savedName; this.userName = savedName; }
          const savedPlan = await safeLS.getItem('user_plan');
          if (savedPlan) this.userPlan = savedPlan;

          const visited = await safeLS.getItem('has_visited');
          if (!visited && this.isGuest) this.showWelcome = true;

          await this.loadUserState();
          await this.loadCheckinData();
          await this.loadPapers();
          await this.loadLeaderboard();
        },

        async welcomeStart() {
          await safeLS.setItem('has_visited', 'true');
          const name = this.nicknameInput.trim();
          if (name) {
            this.displayName = name;
            this.userName = name;
            await safeLS.setItem('guest_nickname', name);
          }
          this.showWelcome = false;
        },

        async loadUserState() {
          if (this.isGuest || !this.userCol) return;
          const state = await this.userCol.findOne({ key: 'plan' });
          if (state) this.userPlan = state.plan || 'free';
        },

        async loadCheckinData() {
          const dates = await safeLS.getItem('checkin_dates');
          if (dates) { try { this.checkinDates = JSON.parse(dates); } catch { this.checkinDates = []; } }
          this.todayChecked = this.checkinDates.includes(this.dateKey(new Date()));
          this.totalCheckins = this.checkinDates.length;
          this.calcStreak();
          if (!this.isGuest && this.checkinCol) {
            const records = await this.checkinCol.find({ user: this.userName }, { sort: { date: -1 } });
            if (records && records.length > 0) {
              const dbDates = records.map(r => r.date);
              const merged = [...new Set([...this.checkinDates, ...dbDates])].sort();
              this.checkinDates = merged;
              await safeLS.setItem('checkin_dates', JSON.stringify(merged));
              this.todayChecked = this.checkinDates.includes(this.dateKey(new Date()));
              this.totalCheckins = this.checkinDates.length;
              this.calcStreak();
            }
          }
        },

        calcStreak() {
          const sorted = [...this.checkinDates].sort().reverse();
          if (sorted.length === 0) { this.streak = 0; this.maxStreak = 0; return; }
          const today = this.dateKey(new Date());
          const yesterday = this.dateKey(new Date(Date.now() - 86400000));
          let streak = 0;
          // 从今天或昨天开始往前数
          let checkDate = sorted.includes(today) ? new Date() : (sorted.includes(yesterday) ? new Date(Date.now() - 86400000) : null);
          if (checkDate) {
            while (this.checkinDates.includes(this.dateKey(checkDate))) {
              streak++;
              checkDate = new Date(checkDate.getTime() - 86400000);
            }
          }
          this.streak = streak;
          // 计算最长连续
          let maxS = 0, curS = 0;
          const allSorted = [...this.checkinDates].sort();
          for (let i = 0; i < allSorted.length; i++) {
            if (i === 0) { curS = 1; }
            else {
              const prev = new Date(allSorted[i-1] + 'T00:00:00');
              const curr = new Date(allSorted[i] + 'T00:00:00');
              const diff = (curr - prev) / 86400000;
              curS = diff === 1 ? curS + 1 : 1;
            }
            maxS = Math.max(maxS, curS);
          }
          this.maxStreak = maxS;
        },

        async doCheckin() {
          const today = this.dateKey(new Date());
          if (this.checkinDates.includes(today)) return;
          this.checkinDates.push(today);
          this.todayChecked = true;
          this.totalCheckins++;
          this.calcStreak();
          await safeLS.setItem('checkin_dates', JSON.stringify(this.checkinDates));
          if (this.checkinCol) await this.checkinCol.insertOne({ user: this.displayName, date: today });
          await this.updateLeaderboard();
          this.showCheckinSuccess = true;
          setTimeout(() => { this.showCheckinSuccess = false; }, 2000);
        },

        async updateLeaderboard() {
          if (!this.leaderCol) { this._updateLocalLB(); return; }
          const name = this.displayName;
          const existing = await this.leaderCol.findOne({ name });
          if (existing) {
            await this.leaderCol.updateOne({ name }, { $set: { streak: this.streak, total: this.totalCheckins } });
          } else {
            await this.leaderCol.insertOne({ name, streak: this.streak, total: this.totalCheckins, isMe: true });
          }
          await this.loadLeaderboard();
        },

        _updateLocalLB() {
          let lb; try { lb = JSON.parse(localStorage.getItem(DB_PREFIX + 'lb')) || []; } catch { lb = []; }
          const idx = lb.findIndex(e => e.name === this.displayName);
          if (idx >= 0) { lb[idx].streak = this.streak; lb[idx].total = this.totalCheckins; }
          else { lb.push({ name: this.displayName, streak: this.streak, total: this.totalCheckins, isMe: true }); }
          try { localStorage.setItem(DB_PREFIX + 'lb', JSON.stringify(lb)); } catch {}
          this._fillLB(lb);
        },

        _fillLB(entries) {
          const samples = [
            { name: '小明同学', streak: 28, total: 45 }, { name: '数学达人', streak: 21, total: 38 },
            { name: '中考加油', streak: 15, total: 32 }, { name: '学霸小王', streak: 12, total: 25 },
            { name: '冲刺满分', streak: 8, total: 18 },
          ];
          for (const s of samples) { if (!entries.find(e => e.name === s.name)) entries.push({ ...s, isMe: false }); }
          entries.sort((a, b) => b.streak - a.streak);
          this.leaderboard = entries.slice(0, 10).map(e => ({ ...e, isMe: e.name === this.displayName }));
        },

        async loadLeaderboard() {
          if (!this.leaderCol) {
            let lb; try { lb = JSON.parse(localStorage.getItem(DB_PREFIX + 'lb')) || []; } catch { lb = []; }
            this._fillLB(lb); return;
          }
          let entries = await this.leaderCol.find({}, { sort: { streak: -1 }, limit: 10 });
          if (!entries || entries.length === 0) {
            let lb; try { lb = JSON.parse(localStorage.getItem(DB_PREFIX + 'lb')) || []; } catch { lb = []; }
            this._fillLB(lb); return;
          }
          if (entries.length < 5) {
            const samples = [
              { name: '小明同学', streak: 28, total: 45 }, { name: '数学达人', streak: 21, total: 38 },
              { name: '中考加油', streak: 15, total: 32 }, { name: '学霸小王', streak: 12, total: 25 },
              { name: '冲刺满分', streak: 8, total: 18 },
            ];
            for (const s of samples) {
              if (!entries.find(e => e.name === s.name)) await this.leaderCol.insertOne({ ...s, isMe: false });
            }
            entries = await this.leaderCol.find({}, { sort: { streak: -1 }, limit: 10 }) || [];
          }
          this.leaderboard = entries.map(e => ({ ...e, isMe: e.name === this.displayName }));
        },

        async loadPapers() {
          let papers = this.collection ? await this.collection.find() : [];
          if (!papers || papers.length === 0) {
            try { const c = localStorage.getItem(DB_PREFIX + 'papers'); if (c) papers = JSON.parse(c); } catch {}
          }
          if (!papers || papers.length === 0) {
            papers = this.seedPapersLocal();
            try { localStorage.setItem(DB_PREFIX + 'papers', JSON.stringify(papers)); } catch {}
            if (this.collection) { for (const p of papers) await this.collection.insertOne(p); }
          }
          this.papers = papers;
        },

        seedPapersLocal() {
          const districts = ['海淀区','西城区','东城区','朝阳区','丰台区','石景山区','通州区','大兴区','顺义区','昌平区','房山区','门头沟区','平谷区','怀柔区','密云区','延庆区'];
          const cats = ['一模','二模','真题','汇编','押题'];
          const difficulties = ['基础','中等','较难','压轴'];
          const topicPool = ['二次函数','几何证明','概率统计','圆','相似三角形','一次函数','方程与不等式','数据分析','旋转与对称','坐标几何','代数综合','实数运算','三角形','四边形','函数图像','统计与概率','动点问题','阅读理解题','新定义题','规律探究'];
          const yearOptions = [2026, 2025, 2024, 2023];
          const result = [];
          let idx = 0;
          for (const dist of districts.slice(0, 10)) {
            for (const cat of cats) {
              for (const year of yearOptions.slice(0, 2)) {
                idx++;
                const shuffled = [...topicPool].sort(() => Math.random() - 0.5);
                result.push({
                  id: 'p' + idx,
                  title: `${year}${dist}${cat === '押题' ? '中考押题' : '中考数学' + cat}${cat === '汇编' ? '精选' : '试卷'}`,
                  district: dist, category: cat, year: year,
                  questionCount: cat === '汇编' ? 30 + Math.floor(Math.random() * 20) : 20 + Math.floor(Math.random() * 10),
                  difficulty: difficulties[Math.floor(Math.random() * difficulties.length)],
                  downloads: 100 + Math.floor(Math.random() * 2000),
                  free: idx % 5 === 0,
                  isNew: year === 2026 && Math.random() > 0.5,
                  topics: shuffled.slice(0, 3 + Math.floor(Math.random() * 4)),
                  description: `${year}年北京${dist}${cat}数学试卷，涵盖中考核心考点，附详细解析。`
                });
              }
            }
          }
          return result;
        },

        dateKey(d) {
          return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        },

        prevMonth() {
          if (this.calendarMonth === 0) { this.calendarMonth = 11; this.calendarYear--; }
          else { this.calendarMonth--; }
        },
        nextMonth() {
          if (this.calendarMonth === 11) { this.calendarMonth = 0; this.calendarYear++; }
          else { this.calendarMonth++; }
        },

              '方程与不等式': ['解方程：x² - 5x + 6 = 0', '解不等式组：2x + 1 > 3 且 x - 2 ≤ 1'],
              '一次函数': ['已知直线 y = kx + b 经过点 A(2, 3) 和点 B(-1, -3)，求 k 和 b 的值。', '直线 y = 2x + 1 与 x 轴的交点坐标为____。'],

            try {
              // 方式1: 标准 doc.save()
              doc.save(fileName);
            } catch (e1) {
              console.warn('[PDF] doc.save 失败，尝试 Blob 下载:', e1);
              try {
                // 方式2: 手动创建 Blob + <a> 下载
                const pdfBlob = doc.output('blob');
                const blobUrl = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(blobUrl); }, 1000);
              } catch (e2) {
                console.warn('[PDF] Blob 下载失败，尝试新窗口:', e2);
                // 方式3: 用 data URL 在新窗口打开
                const dataUri = doc.output('datauristring');
                const win = window.open('', '_blank');
                if (win) {
                  win.document.write(`<html><head><title>${fileName}</title></head><body style="margin:0"><embed width="100%" height="100%" src="${dataUri}" type="application/pdf"></body></html>`);
                } else {
                  // 方式4: 最终兜底 - 直接用 location
                  window.location.href = doc.output('datauristring');
                }
              }
            }

            this.showDownloadToast = true;
            setTimeout(() => this.showDownloadToast = false, 2500);

          } catch (err) {
            console.error('[PDF] 生成失败:', err);
            alert('PDF生成失败：' + err.message + '\n请检查网络连接后重试');
          } finally {
            this.downloadingPDF = false;
          }
        },

        planName() {
          const names = { free: '免费版', month: '月卡会员', quarter: '季卡会员', year: '年卡会员' };
          return names[this.userPlan] || '免费版';
        },

        selectedPlanObj() {
          return this.plans.find(p => p.id === this.selectedPlan);
        },

        async handlePay() {
          // 生成订单号：时间戳 + 随机4位
          const ts = new Date();
          const orderId = 'ZK' + ts.getFullYear().toString().slice(2) +
            String(ts.getMonth() + 1).padStart(2, '0') +
            String(ts.getDate()).padStart(2, '0') +
            String(ts.getHours()).padStart(2, '0') +
            String(ts.getMinutes()).padStart(2, '0') +
            String(Math.floor(Math.random() * 9000) + 1000);
          this.payOrderId = orderId;

          // 记录待支付订单
          const order = {
            orderId,
            plan: this.selectedPlan,
            planName: this.selectedPlanObj()?.name,
            price: this.selectedPlanObj()?.price,
            payMethod: this.selectedPayment,
            status: 'pending',
            createdAt: ts.toISOString(),
            userName: this.displayName,
          };
          await safeLS.setItem('pending_order', JSON.stringify(order));

          // 打开支付弹窗
          this.showPayModal = true;
        },

        async confirmPaid() {
          // 用户确认已支付，记录订单并更新状态
          const orderStr = await safeLS.getItem('pending_order');
          if (orderStr) {
            try {
              const order = JSON.parse(orderStr);
              order.status = 'paid_unconfirmed';
              order.paidAt = new Date().toISOString();

              // 保存订单记录到历史
              const historyStr = await safeLS.getItem('order_history') || '[]';
              const history = JSON.parse(historyStr);
              history.unshift(order);
              await safeLS.setItem('order_history', JSON.stringify(history));

              // 同步到集合（如果可用）
              if (!this.isGuest && this.userCol) {
                try {
                  await this.userCol.insertOne({ key: 'order_' + order.orderId, ...order });
                } catch (e) { console.warn('[Pay] 订单同步失败:', e.message); }
              }
            } catch (e) { console.warn('[Pay] 订单解析失败:', e); }
          }

          // 先临时开通会员（信任用户已支付），待人工确认
          this.userPlan = this.selectedPlan;
          await safeLS.setItem('user_plan', this.selectedPlan);
          if (!this.isGuest && this.userCol) {
            try {
              await this.userCol.replaceOne({ key: 'plan' }, { key: 'plan', plan: this.selectedPlan }, { upsert: true });
            } catch (e) { console.warn('[Pay] 计划同步失败:', e.message); }
          }
          await safeLS.setItem('pending_order', '');

          this.showPayModal = false;
          this.showPaySuccess = true;
        },

        cancelPay() {
          this.showPayModal = false;
          this.payOrderId = '';
          if (this.payTimer) { clearInterval(this.payTimer); this.payTimer = null; }
        },

        async copyText(text) {
          if (!text) return;
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(text);
            } else {
              const ta = document.createElement('textarea');
              ta.value = text;
              ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
              document.body.appendChild(ta);
              ta.select();
              document.execCommand('copy');
              document.body.removeChild(ta);
            }
            alert('已复制到剪贴板');
          } catch { alert('复制失败，请手动复制'); }
        },

        handleShare() {
          // 尝试使用系统分享 API（移动端非微信时可用）
          if (navigator.share && !this.isWechat) {
            navigator.share({
              title: '北大熊猫老师中考数学押题 · 精准押题 每日打卡',
              text: '📚 2026北京中考数学押题来了！覆盖16区一模/二模/真题/汇编，每天打卡冲刺满分！',
              url: this.shareUrl
            }).catch(() => {});
          }
          this.showShareModal = true;
          this.copied = false;
        },

        async copyShareLink() {
          const text = this.shareUrl;
          try {
            // 优先使用 Clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(text);
              this.copied = true;
            } else {
              throw new Error('fallback');
            }
          } catch {
            // 微信浏览器兼容：textarea + execCommand 降级方案
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            ta.setSelectionRange(0, ta.value.length);
            document.execCommand('copy');
            document.body.removeChild(ta);
            this.copied = true;
          }
          if (this.copied) {
            setTimeout(() => this.copied = false, 3000);
          }
        },

        async saveNickname() {
          const name = this.nicknameInput.trim();
          if (!name) return;
          this.displayName = name;
          this.userName = name;
          await safeLS.setItem('guest_nickname', name);
          this.showNicknameModal = false;
        },

        categoryColor(cat) {
          const map = { '一模':'bg-blue-50 text-blue-600','二模':'bg-purple-50 text-purple-600','真题':'bg-green-50 text-green-600','汇编':'bg-orange-50 text-orange-600','押题':'bg-red-50 text-red-600' };
          return map[cat] || 'bg-gray-50 text-gray-600';
        },
        categoryBg(cat) {
          const map = { '一模':'bg-blue-50','二模':'bg-purple-50','真题':'bg-green-50','汇编':'bg-orange-50','押题':'bg-red-50' };
          return map[cat] || 'bg-gray-50';
        },
        categoryIcon(cat) {
          const map = { '一模':'lucide:file-text','二模':'lucide:file-check','真题':'lucide:file-badge','汇编':'lucide:files','押题':'lucide:target' };
          return map[cat] || 'lucide:file';
        },
        categoryIconColor(cat) {
          const map = { '一模':'text-blue-500','二模':'text-purple-500','真题':'text-green-500','汇编':'text-orange-500','押题':'text-red-500' };
          return map[cat] || 'text-gray-500';
        },
      }));
    });
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
